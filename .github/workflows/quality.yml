name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  docs-and-contracts:
    name: Docs and repository contracts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run quality checks
        run: python scripts/quality_check.py

      - name: Check CLI docs
        run: python scripts/cli_docs_check.py

      - name: Check whitespace
        run: git diff --check

  node:
    name: TypeScript build and tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Package smoke
        run: npm run smoke:package

      - name: Workspace smoke
        run: npm run smoke:workspace

      - name: Lifecycle demo
        run: npm run demo:lifecycle

      - name: Release acceptance
        run: npm run acceptance:release
